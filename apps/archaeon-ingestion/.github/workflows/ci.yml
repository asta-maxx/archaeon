name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit Tests
        run: pnpm test

      - name: E2E Tests
        run: pnpm test:e2e
        env:
          INTERNAL_API_KEY: 'test-api-key'
          OPENAI_API_KEY: 'test-openai'
          GITHUB_APP_ID: '12345'
          GITHUB_APP_PRIVATE_KEY: 'test-key'

      - name: Build Docker Image
        run: docker build -t archaeon/repository-intelligence-service:test .
