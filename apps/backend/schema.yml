openapi: 3.0.3
info:
  title: Archaeon Ecosystem Backend API
  version: 1.0.0
  description: Production API orchestrator for workspaces, projects, repos, graphs
    and memory persistence.
paths:
  /api/auth/github/callback/:
    post:
      operationId: api_auth_github_callback_create
      description: Exchanges code from GitHub callback redirect for JWT authentication
        tokens.
      summary: GitHub OAuth Callback login handler
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GitHubLogin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GitHubLogin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GitHubLogin'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: User successfully authenticated.
        '401':
          description: Authentication credentials rejected.
  /api/auth/github/login/:
    post:
      operationId: api_auth_github_login_create
      description: Returns the redirection URL to initiate GitHub OAuth callback handshake.
      summary: Get GitHub OAuth Authorization URL
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: GitHub Authorization URL successfully generated.
  /api/auth/logout/:
    post:
      operationId: api_auth_logout_create
      description: Blacklists the provided refresh token, invalidating the session.
      summary: Log out User session
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Logout'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Logout'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Logout'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Successfully logged out.
        '401':
          description: Invalid or expired token.
  /api/auth/me/:
    get:
      operationId: api_auth_me_retrieve
      description: Returns user details and organization workspaces listing.
      summary: Retrieve Current User Profile
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
          description: Profile details retrieved.
  /api/auth/refresh/:
    post:
      operationId: api_auth_refresh_create
      description: Exchanges a valid refresh token for a new short-lived access token.
      summary: Refresh Access Token
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/internal/repository/process/:
    post:
      operationId: api_internal_repository_process_create
      description: Private endpoint for the Repository Intelligence Service to trigger
        processing syncs.
      summary: Internal Repository Sync Callback
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/invitations/accept/:
    post:
      operationId: api_invitations_accept_create
      description: Accepts an invitation using the UUID token and adds user to Workspace.
      summary: Accept Workspace Invitation
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AcceptInvitation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AcceptInvitation'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/webhooks/github/:
    post:
      operationId: api_webhooks_github_create
      description: Receives GitHub webhook updates, verifying payload authenticity
        with HMAC-SHA256 signature.
      summary: Ingest GitHub Webhook
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/workspaces/:
    get:
      operationId: api_workspaces_list
      description: ViewSet handling CRUD actions and ownership transfer for Workspace
        workspaces.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWorkspaceCreateList'
          description: ''
    post:
      operationId: api_workspaces_create
      description: Creates a new multi-tenant workspace and registers current user
        as Owner.
      summary: Create Workspace
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceCreate'
          description: ''
  /api/workspaces/{id}/:
    get:
      operationId: api_workspaces_retrieve
      description: ViewSet handling CRUD actions and ownership transfer for Workspace
        workspaces.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Workspace.
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceCreate'
          description: ''
    put:
      operationId: api_workspaces_update
      description: ViewSet handling CRUD actions and ownership transfer for Workspace
        workspaces.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Workspace.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceCreate'
          description: ''
    patch:
      operationId: api_workspaces_partial_update
      description: ViewSet handling CRUD actions and ownership transfer for Workspace
        workspaces.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Workspace.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedWorkspaceCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedWorkspaceCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedWorkspaceCreate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceCreate'
          description: ''
    delete:
      operationId: api_workspaces_destroy
      description: Soft deletes the workspace, its projects, and memberships. Requires
        Owner role.
      summary: Delete Workspace
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Workspace.
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/workspaces/{id}/transfer-ownership/:
    post:
      operationId: api_workspaces_transfer_ownership_create
      description: Transfers the Owner role to another active member. Requires Owner
        role.
      summary: Transfer Workspace Ownership
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Workspace.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnershipTransfer'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OwnershipTransfer'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OwnershipTransfer'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/workspaces/{workspace_id}/analytics/developers/:
    get:
      operationId: api_workspaces_analytics_developers_list
      description: Returns the counts of decisions grouped by developer name, ordered
        descending.
      summary: Workspace Decisions Developer Breakdown
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeveloperBreakdown'
          description: ''
  /api/workspaces/{workspace_id}/analytics/modules/:
    get:
      operationId: api_workspaces_analytics_modules_list
      description: Returns the counts of decisions grouped by module name, ordered
        descending.
      summary: Workspace Decisions Module Breakdown
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModuleBreakdown'
          description: ''
  /api/workspaces/{workspace_id}/analytics/summary/:
    get:
      operationId: api_workspaces_analytics_summary_retrieve
      description: Returns overall metrics of decisions, constraints, alternatives,
        and incidents in a workspace.
      summary: Workspace Analytics Summary
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceAnalyticsSummary'
          description: ''
  /api/workspaces/{workspace_id}/analytics/trends/:
    get:
      operationId: api_workspaces_analytics_trends_list
      description: Returns decision creation count grouped by month.
      summary: Workspace Decisions Historical Trend
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DecisionTrend'
          description: ''
  /api/workspaces/{workspace_id}/decisions/:
    get:
      operationId: api_workspaces_decisions_list
      description: Returns all active/non-superseded architecture decisions in the
        workspace.
      summary: List Active Decisions
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArchitectureDecisionList'
          description: ''
    post:
      operationId: api_workspaces_decisions_create
      description: Creates a new architecture decision, logging the creation audit,
        syncing to Neo4j graph and indexing in Cognée.
      summary: Create/Remember Decision
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchitectureDecision'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ArchitectureDecision'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArchitectureDecision'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchitectureDecision'
          description: ''
  /api/workspaces/{workspace_id}/decisions/{id}/:
    get:
      operationId: api_workspaces_decisions_retrieve
      description: ViewSet managing architecture decisions retrieval, lifecycles,
        and audit trails.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchitectureDecision'
          description: ''
    put:
      operationId: api_workspaces_decisions_update
      description: Updates an existing decision record, creating an audit log trail,
        syncing update to Neo4j and improve dataset in Cognée.
      summary: Improve/Update Decision
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchitectureDecision'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ArchitectureDecision'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArchitectureDecision'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchitectureDecision'
          description: ''
  /api/workspaces/{workspace_id}/decisions/{id}/forget/:
    post:
      operationId: api_workspaces_decisions_forget_create
      description: Flags a decision as superseded (forces status forgotten) and logs
        action history.
      summary: Forget/Supersede Decision
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchitectureDecision'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ArchitectureDecision'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArchitectureDecision'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/workspaces/{workspace_id}/decisions/{id}/history/:
    get:
      operationId: api_workspaces_decisions_history_list
      description: Returns chronological log trail tracking state changes for this
        decision.
      summary: Get Decision Audit History
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDecisionHistoryList'
          description: ''
  /api/workspaces/{workspace_id}/decisions/{id}/supersession-chain/:
    get:
      operationId: api_workspaces_decisions_supersession_chain_retrieve
      description: Returns the supersession hierarchy showing decisions lineage.
      summary: Get Decision Supersession Chain
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/workspaces/{workspace_id}/decisions/adr/{adr_number}/constraints/:
    get:
      operationId: api_workspaces_decisions_adr_constraints_retrieve
      description: Returns constraints introduced in an ADR source identifier.
      summary: Get ADR Constraints
      parameters:
      - in: path
        name: adr_number
        schema:
          type: string
        required: true
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/workspaces/{workspace_id}/decisions/graph/:
    get:
      operationId: api_workspaces_decisions_graph_retrieve
      description: Returns a React Flow nodes & edges snapshot representation of decisions
        in the workspace.
      summary: Retrieve Workspace Decisions Graph
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/workspaces/{workspace_id}/decisions/module/{module_name}/:
    get:
      operationId: api_workspaces_decisions_module_list
      description: Filter workspace decisions affecting a specific component module.
      summary: Get Decisions by Module
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: path
        name: module_name
        schema:
          type: string
        required: true
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArchitectureDecisionList'
          description: ''
  /api/workspaces/{workspace_id}/decisions/superseded/:
    get:
      operationId: api_workspaces_decisions_superseded_list
      description: Returns decisions that have been forgotten/superseded in the workspace.
      summary: List Superseded Decisions
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArchitectureDecisionList'
          description: ''
  /api/workspaces/{workspace_id}/decisions/timeline/:
    get:
      operationId: api_workspaces_decisions_timeline_list
      description: Returns a global chronological event feed tracking decision updates
        and creation timelines.
      summary: Retrieve Workspace Timeline
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDecisionHistoryList'
          description: ''
  /api/workspaces/{workspace_id}/invitations/:
    get:
      operationId: api_workspaces_invitations_list
      description: ViewSet handling sending, listing, and revoking invitations in
        workspace scope.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInvitationList'
          description: ''
    post:
      operationId: api_workspaces_invitations_create
      description: Generates an invitation token sent to email address. Requires Admin
        role.
      summary: Send Invitation
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Invitation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Invitation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Invitation'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
          description: ''
  /api/workspaces/{workspace_id}/invitations/{id}/:
    get:
      operationId: api_workspaces_invitations_retrieve
      description: ViewSet handling sending, listing, and revoking invitations in
        workspace scope.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
