components:
  schemas:
    AcceptInvitation:
      type: object
      description: Serializer validating invitation accept action.
      properties:
        token:
          type: string
          format: uuid
          description: The invitation UUID token to accept.
      required:
      - token
    ArchitectureDecision:
      type: object
      description: Serializer representing complete ArchitectureDecision details.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        repository:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        status:
          type: string
          maxLength: 50
        rationale:
          type: string
        module_name:
          type: string
          maxLength: 255
        adr_source:
          type: string
          maxLength: 255
        developer_name:
          type: string
          maxLength: 255
        commit_hash:
          type: string
          maxLength: 100
        pr_number:
          type: string
          maxLength: 100
        incident_key:
          type: string
          maxLength: 100
        superseded_by:
          type: string
          format: uuid
          nullable: true
        constraints:
          type: array
          items:
            $ref: '#/components/schemas/DecisionConstraint'
          readOnly: true
        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/DecisionAlternative'
          readOnly: true
        history:
          type: array
          items:
            $ref: '#/components/schemas/DecisionHistory'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - alternatives
      - constraints
      - created_at
      - history
      - id
      - repository
      - title
      - updated_at
    CurrentUser:
      type: object
      description: Serializer mapping the authenticated user alongside list of workspaces.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        name:
          type: string
          maxLength: 255
        github_username:
          type: string
          nullable: true
          maxLength: 100
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        is_staff:
          type: boolean
          readOnly: true
        is_superuser:
          type: boolean
          readOnly: true
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        memberships:
          type: array
          items:
            $ref: '#/components/schemas/Membership'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - id
      - is_staff
      - is_superuser
      - memberships
    DecisionAlternative:
      type: object
      description: Serializer for decision alternatives.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        alternative_text:
          type: string
      required:
      - alternative_text
      - id
    DecisionConstraint:
      type: object
      description: Serializer for decision constraints.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        constraint_text:
          type: string
      required:
      - constraint_text
      - id
    DecisionHistory:
      type: object
      description: Serializer for decision history audit trail.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        action_type:
          type: string
          maxLength: 50
        description:
          type: string
        timestamp:
          type: string
          format: date-time
          readOnly: true
      required:
      - action_type
      - description
      - id
      - timestamp
    DecisionTrend:
      type: object
      description: Serializer representing decision counts over time.
      properties:
        month:
          type: string
        count:
          type: integer
      required:
      - count
      - month
    DeveloperBreakdown:
      type: object
      description: Serializer for decision count per developer.
      properties:
        developer_name:
          type: string
        count:
          type: integer
      required:
      - count
      - developer_name
    GitHubLogin:
      type: object
      description: Serializer validating GitHub auth code query params sent by the
        frontend.
      properties:
        code:
          type: string
          description: The code returned by GitHub OAuth authorize callback.
        state:
          type: string
          description: Optional state validation token matching GitHub OAuth query.
      required:
      - code
    Invitation:
      type: object
      description: Serializer mapping workspace invitation details.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        workspace:
          type: string
          format: uuid
          readOnly: true
        inviter:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        token:
          type: string
          format: uuid
          readOnly: true
        is_accepted:
          type: boolean
          readOnly: true
        is_expired:
          type: boolean
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - expires_at
      - id
      - inviter
      - is_accepted
      - is_expired
      - token
      - workspace
    JobTypeEnum:
      enum:
      - repository_import
      - webhook
      - graph_update
      - memory_update
      - notification
      type: string
      description: |-
        * `repository_import` - Repository Import
        * `webhook` - Webhook Dispatch
